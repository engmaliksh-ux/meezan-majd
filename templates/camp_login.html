<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>دخول الجهات — ميزان مجد</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--teal-900:#0f3d2e;--teal-800:#14532d;--teal-700:#1a6b3a;--teal-600:#2d8a50;
      --amber:#e8a020;--sand:#fafaf7;--sand-100:#f4f4ee;--sand-200:#e5e5d8;
      --ink:#1a1a2e;--ink-6:#475569;--ink-4:#94a3b8;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Arial,sans-serif;}
body{background:linear-gradient(135deg,var(--teal-900) 0%,#1e5c3a 50%,var(--teal-700) 100%);
     min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
     position:relative;overflow:hidden;}
body::before{content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,.04) 1px,transparent 1px);
  background-size:28px 28px;pointer-events:none;}
.wrap{width:100%;max-width:420px;position:relative;z-index:1;}

/* ── شعار ── */
.brand{text-align:center;margin-bottom:28px;}
.brand-logo{display:inline-flex;align-items:center;gap:10px;
            background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
            border-radius:999px;padding:10px 20px;margin-bottom:14px;}
.brand-icon{width:38px;height:38px;background:var(--teal-600);border-radius:10px;
            display:flex;align-items:center;justify-content:center;color:var(--amber);font-size:1rem;}
.brand-name{font-size:1.1rem;font-weight:900;color:#fff;}
.brand h1{font-size:1.2rem;font-weight:800;color:#fff;margin-bottom:4px;}
.brand p{font-size:.8rem;color:rgba(255,255,255,.6);}

/* ── نوع الجهة ── */
.entity-tabs{display:flex;gap:6px;background:rgba(255,255,255,.08);border-radius:14px;padding:5px;margin-bottom:22px;}
.etab{flex:1;padding:9px 6px;font-size:.78rem;font-weight:700;border:none;
      background:transparent;color:rgba(255,255,255,.65);border-radius:10px;
      cursor:pointer;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:4px;}
.etab i{font-size:1rem;}
.etab.active{background:rgba(255,255,255,.15);color:#fff;}

/* ── البطاقة ── */
.card{background:#fff;border-radius:20px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.flash-box{padding:10px 14px;border-radius:9px;margin-bottom:14px;font-size:.83rem;
           font-weight:600;display:none;align-items:center;gap:8px;}
.flash-box.error{background:#fee2e2;color:#991b1b;display:flex;}
.flash-box.success{background:#dcfce7;color:#166534;display:flex;}
.fg{margin-bottom:14px;}
.fg label{font-size:.78rem;font-weight:700;color:var(--ink-6);display:block;margin-bottom:6px;}
.fg input{width:100%;padding:11px 14px;border:1.5px solid var(--sand-200);border-radius:10px;
          font-size:.88rem;color:var(--ink);transition:.15s;font-family:inherit;}
.fg input:focus{border-color:var(--teal-600);outline:none;box-shadow:0 0 0 3px rgba(45,138,80,.12);}
.pw-wrap{position:relative;}
.pw-wrap input{padding-left:42px;}
.pw-toggle{position:absolute;left:12px;top:50%;transform:translateY(-50%);
           background:none;border:none;cursor:pointer;color:var(--ink-4);font-size:.9rem;padding:4px;}
.btn-login{width:100%;padding:13px;background:var(--teal-700);color:#fff;border:none;
           border-radius:12px;font-size:.95rem;font-weight:700;cursor:pointer;transition:.15s;
           display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-login:hover{background:var(--teal-900);}
.forgot-link{text-align:center;margin-top:12px;font-size:.8rem;color:var(--ink-4);}
.forgot-link button{background:none;border:none;color:var(--teal-700);font-weight:700;
                    cursor:pointer;font-size:.8rem;}
.links{text-align:center;margin-top:16px;font-size:.8rem;color:rgba(255,255,255,.6);}
.links a{color:rgba(255,255,255,.85);font-weight:600;text-decoration:none;margin:0 8px;}
.links a:hover{color:#fff;}

/* ── نسيت كلمة المرور ── */
#forgot-panel{display:none;}
.back-btn{background:none;border:none;color:var(--ink-6);font-size:.8rem;cursor:pointer;
          display:flex;align-items:center;gap:5px;margin-bottom:14px;padding:0;}
.otp-row{display:flex;gap:8px;direction:ltr;justify-content:center;margin:14px 0;}
.otp-row input{width:42px;height:46px;text-align:center;font-size:1.1rem;font-weight:700;
               border:1.5px solid var(--sand-200);border-radius:9px;transition:.15s;}
.otp-row input:focus{border-color:var(--teal-600);outline:none;box-shadow:0 0 0 3px rgba(45,138,80,.12);}
</style>
</head>
<body>
<div class="wrap">

  <!-- شعار الموقع -->
  <div class="brand">
    <div class="brand-logo">
      <div class="brand-icon"><i class="fas fa-balance-scale"></i></div>
      <span class="brand-name">ميزان مجد</span>
    </div>
    <h1>دخول لوحة التحكم</h1>
    <p>مخيم · لجنة · عائلة</p>
  </div>

  <!-- أنواع الجهات (زخرفي فقط — نفس الـ endpoint) -->
  <div class="entity-tabs">
    <button class="etab active" onclick="setTab(this)">
      <i class="fas fa-campground"></i><span>مخيم</span>
    </button>
    <button class="etab" onclick="setTab(this)">
      <i class="fas fa-landmark"></i><span>لجنة</span>
    </button>
    <button class="etab" onclick="setTab(this)">
      <i class="fas fa-home"></i><span>عائلة</span>
    </button>
  </div>

  <div class="card">
    <div id="flash-box" class="flash-box">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <i class="fas fa-exclamation-circle"></i> {{ msg }}
        {% endfor %}
      {% endwith %}
    </div>

    <!-- ── نموذج الدخول ── -->
    <div id="login-panel">
      <form method="POST" id="login-form">
        <div class="fg">
          <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
          <input type="email" name="email" id="inp-email" placeholder="example@mail.com" required dir="ltr">
        </div>
        <div class="fg">
          <label><i class="fas fa-lock"></i> كلمة المرور</label>
          <div class="pw-wrap">
            <input type="password" name="password" id="inp-pw" placeholder="••••••••" required>
            <button type="button" class="pw-toggle" onclick="togglePw()"><i class="fas fa-eye" id="pw-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> دخول</button>
      </form>
      <div class="forgot-link">
        <button onclick="showForgot()">نسيت كلمة المرور؟</button>
      </div>
    </div>

    <!-- ── نسيت كلمة المرور ── -->
    <div id="forgot-panel">
      <button class="back-btn" onclick="showLogin()"><i class="fas fa-arrow-right"></i> رجوع</button>

      <!-- خطوة 1: أدخل البريد -->
      <div id="frg-step1">
        <div style="font-size:.85rem;font-weight:700;color:var(--ink);margin-bottom:14px;">
          <i class="fas fa-key" style="color:var(--teal-600);"></i> استعادة كلمة المرور
        </div>
        <div class="fg">
          <label>البريد الإلكتروني المسجل</label>
          <input type="email" id="frg-email" placeholder="example@mail.com" dir="ltr">
        </div>
        <button class="btn-login" onclick="campForgotSend()"><i class="fas fa-paper-plane"></i> إرسال رمز التحقق</button>
        <div class="forgot-link" style="margin-top:10px;">
          <button onclick="openEmailInbox()" style="color:var(--ink-4);">تحقق من وصول الرمز</button>
        </div>
      </div>

      <!-- خطوة 2: رمز OTP + كلمة مرور جديدة -->
      <div id="frg-step2" style="display:none;">
        <div style="font-size:.83rem;color:var(--ink-6);margin-bottom:12px;text-align:center;">
          أدخل الرمز المرسل إلى <strong id="frg-sent-to"></strong>
        </div>
        <div class="otp-row" id="frg-otp-inputs">
          <input type="text" maxlength="1" inputmode="numeric">
          <input type="text" maxlength="1" inputmode="numeric">
          <input type="text" maxlength="1" inputmode="numeric">
          <input type="text" maxlength="1" inputmode="numeric">
          <input type="text" maxlength="1" inputmode="numeric">
          <input type="text" maxlength="1" inputmode="numeric">
        </div>
        <div class="fg">
          <label>كلمة المرور الجديدة</label>
          <input type="password" id="frg-newpw" placeholder="6 أحرف على الأقل">
        </div>
        <div class="fg">
          <label>تأكيد كلمة المرور</label>
          <input type="password" id="frg-confirmpw" placeholder="أعد الكتابة">
        </div>
        <button class="btn-login" onclick="campResetPassword()"><i class="fas fa-check"></i> تغيير كلمة المرور</button>
      </div>
    </div>
  </div>

  <div class="links">
    <a href="/register/camp">تسجيل جهة جديدة</a> |
    <a href="/">الصفحة الرئيسية</a>
  </div>
</div>

<script>
// إظهار flash من server
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  document.addEventListener('DOMContentLoaded',()=>{
    const b = document.getElementById('flash-box');
    b.className = 'flash-box error';
  });
  {% endif %}
{% endwith %}

function setTab(el){
  document.querySelectorAll('.etab').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
}
function togglePw(){
  const inp = document.getElementById('inp-pw');
  const eye = document.getElementById('pw-eye');
  if(inp.type==='password'){ inp.type='text'; eye.className='fas fa-eye-slash'; }
  else { inp.type='password'; eye.className='fas fa-eye'; }
}
function showForgot(){
  document.getElementById('login-panel').style.display='none';
  document.getElementById('forgot-panel').style.display='block';
  document.getElementById('frg-email').value = document.getElementById('inp-email').value||'';
}
function showLogin(){
  document.getElementById('forgot-panel').style.display='none';
  document.getElementById('login-panel').style.display='block';
}
function openEmailInbox(){
  window.open('https://mail.google.com/mail/u/0/#spam','_blank');
}
async function campForgotSend(){
  const email=(document.getElementById('frg-email').value||'').trim();
  if(!email){alert('أدخل البريد الإلكتروني');return;}
  const r=await fetch('/api/camp/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})}).then(x=>x.json());
  if(r.ok){
    document.getElementById('frg-sent-to').textContent=email;
    document.getElementById('frg-step1').style.display='none';
    document.getElementById('frg-step2').style.display='block';
    setupOTP('frg-otp-inputs');
  } else { alert(r.error||'خطأ'); }
}
async function campResetPassword(){
  const email=(document.getElementById('frg-email').value||'').trim();
  const code=getOTP('frg-otp-inputs');
  const pw=document.getElementById('frg-newpw').value;
  const cf=document.getElementById('frg-confirmpw').value;
  if(code.length<6){alert('أدخل الرمز كاملاً');return;}
  if(pw!==cf){alert('كلمتا المرور غير متطابقتين');return;}
  if(pw.length<6){alert('كلمة المرور قصيرة جداً');return;}
  const r=await fetch('/api/camp/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,code,password:pw})}).then(x=>x.json());
  if(r.ok){ alert('✅ تم تغيير كلمة المرور — سجّل دخولك الآن'); showLogin(); }
  else { alert(r.error||'خطأ'); }
}
function setupOTP(rowId){
  const inputs=[...document.getElementById(rowId).querySelectorAll('input')];
  inputs.forEach((inp,i)=>{
    inp.addEventListener('input',()=>{ if(inp.value&&i<inputs.length-1) inputs[i+1].focus(); });
    inp.addEventListener('keydown',e=>{ if(e.key==='Backspace'&&!inp.value&&i>0) inputs[i-1].focus(); });
  });
  inputs[0].focus();
}
function getOTP(rowId){
  return[...document.getElementById(rowId).querySelectorAll('input')].map(i=>i.value).join('');
}
</script>
</body>
</html>

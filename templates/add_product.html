{% extends 'base.html' %}

{% block title %}إضافة صنف – مخزن الخير{% endblock %}

{% block content %}

<div class="page-header">
    <h2 class="page-title">
        <i class="fas fa-plus-circle"></i>
        إضافة صنف جديد
    </h2>
    <a href="/products" class="btn btn-secondary">
        <i class="fas fa-arrow-right me-1"></i>
        رجوع
    </a>
</div>

<div class="card" style="max-width:500px;">
    <div class="card-header">
        <i class="fas fa-box" style="color:#1a6b3a;"></i>
        بيانات الصنف
    </div>
    <div class="card-body">
        <form method="POST">
<input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
<input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div class="mb-4">
                <label class="form-label">اسم الصنف <span class="text-danger">*</span></label>
                <input
                    class="form-control"
                    name="name"
                    type="text"
                    placeholder="مثال: طحين، سكر، زيت..."
                    required>
            </div>

            <div class="mb-4">
                <label class="form-label">الوحدة <span class="text-danger">*</span></label>
                <input
                    class="form-control"
                    name="unit"
                    type="text"
                    placeholder="مثال: كيلو، علبة، كرتون..."
                    required>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-1"></i>
                    حفظ الصنف
                </button>
                <a href="/products" class="btn btn-secondary">إلغاء</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}

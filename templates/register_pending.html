<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>في انتظار الموافقة – مخزن الخير</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
  <div class="auth-card" style="max-width:440px;">
    <div class="auth-header" style="background:linear-gradient(135deg,#d4880a,#f0a500);">
      <div class="auth-logo"><i class="fas fa-hourglass-half"></i></div>
      <h3>طلبك قيد المراجعة</h3>
      <p>سيتم إشعارك عند الموافقة</p>
    </div>
    <div class="auth-body text-center">
      <div style="font-size:4rem;margin:16px 0;">⏳</div>
      <h5 style="font-weight:800;margin-bottom:12px;">مرحباً، {{ full_name }}</h5>
      <p style="color:#6c7a72;font-size:.92rem;line-height:1.7;">
        تم إرسال طلب تسجيلك كـ <strong>{{ role_label }}</strong> بنجاح.<br>
        في انتظار موافقة مدير المؤسسة على حسابك.
      </p>

      <div class="pending-steps">
        <div class="step done"><i class="fas fa-check-circle"></i> تعبئة بيانات التسجيل</div>
        <div class="step active"><i class="fas fa-clock"></i> مراجعة المدير</div>
        <div class="step"><i class="fas fa-circle"></i> تفعيل الحساب</div>
      </div>

      <a href="/login" class="auth-btn mt-3" style="display:block;">
        <i class="fas fa-sign-in-alt me-2"></i>العودة لتسجيل الدخول
      </a>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>إنشاء حساب – مخزن الخير</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
  <div class="auth-card" style="max-width:500px;">
    <div class="auth-header">
      <div class="auth-logo"><i class="fas fa-warehouse"></i></div>
      <h3>مخزن الخير</h3>
      <p>نظام إدارة المخزون الخيري</p>
    </div>
    <div class="auth-body">
      <h5 class="auth-title">إنشاء حساب جديد</h5>
      <p style="color:#6c7a72;font-size:.9rem;margin-bottom:22px;">
        اختر نوع حسابك للمتابعة:
      </p>

      <!-- خيار 1: مؤسسة جديدة -->
      <a href="/register/org" class="choice-card mb-3">
        <div class="choice-icon" style="background:linear-gradient(135deg,#1a6b3a,#2d9e5a);">
          <i class="fas fa-building"></i>
        </div>
        <div class="choice-text">
          <div class="choice-title">مؤسسة جديدة</div>
          <div class="choice-desc">أنا أُنشئ هذا النظام لمؤسستي لأول مرة — سأكون المدير</div>
        </div>
        <i class="fas fa-chevron-left choice-arrow"></i>
      </a>

      <!-- خيار 2: موظف في مؤسسة موجودة -->
      <a href="/register/staff" class="choice-card">
        <div class="choice-icon" style="background:linear-gradient(135deg,#1565c0,#1e88e5);">
          <i class="fas fa-user-tie"></i>
        </div>
        <div class="choice-text">
          <div class="choice-title">موظف في مؤسسة موجودة</div>
          <div class="choice-desc">مؤسستي مسجّلة ولدي رمز المؤسسة — أريد إنشاء حسابي</div>
        </div>
        <i class="fas fa-chevron-left choice-arrow"></i>
      </a>

      <div class="auth-switch mt-4">
        لديك حساب؟ <a href="/login">تسجيل الدخول</a>
      </div>
    </div>
  </div>
</body>
</html>

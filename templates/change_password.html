{% extends 'base.html' %}
{% block title %}تغيير كلمة المرور – ميزان مجد{% endblock %}
{% block content %}

<div class="page-header">
  <h2 class="page-title"><i class="fas fa-key"></i> تغيير كلمة المرور</h2>
</div>

<!-- الكارد في منتصف الصفحة -->
<div class="d-flex justify-content-center">
  <div class="card" style="width:100%;max-width:480px;">
    <div class="card-header">
      <i class="fas fa-lock" style="color:#1a6b3a;"></i>
      تغيير كلمة مرور حسابك
    </div>
    <div class="card-body">

      {% if success %}
      <div class="alert alert-success text-center" style="border-radius:10px;">
        <i class="fas fa-check-circle fa-2x mb-2 d-block" style="color:#1a6b3a;"></i>
        <strong>تم تغيير كلمة المرور بنجاح!</strong>
      </div>
      {% endif %}

      {% if error %}
      <div class="alert alert-danger">
        <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
      </div>
      {% endif %}

      <form method="POST">
<input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
<input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

        <div class="mb-3">
          <label class="form-label">كلمة المرور الحالية <span class="text-danger">*</span></label>
          <div style="position:relative;">
            <i class="fas fa-lock" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#6c7a72;pointer-events:none;"></i>
            <input type="password" class="form-control" name="current_password"
                   style="padding-right:38px;"
                   placeholder="أدخل كلمة مرورك الحالية" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">كلمة المرور الجديدة <span class="text-danger">*</span></label>
          <div style="position:relative;">
            <i class="fas fa-lock" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#1a6b3a;pointer-events:none;"></i>
            <input type="password" class="form-control" name="new_password"
                   style="padding-right:38px;"
                   placeholder="8 أحرف على الأقل" minlength="8"
                   id="new_pass" required>
          </div>
          <!-- مؤشر قوة كلمة المرور -->
          <div id="strength-wrap" style="display:none;margin-top:8px;">
            <div style="height:5px;background:#e9ecef;border-radius:3px;overflow:hidden;">
              <div id="strength-fill" style="height:100%;width:0;border-radius:3px;transition:all .3s;"></div>
            </div>
            <span id="strength-text" style="font-size:.74rem;margin-top:3px;display:block;"></span>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">تأكيد كلمة المرور الجديدة <span class="text-danger">*</span></label>
          <div style="position:relative;">
            <i class="fas fa-lock" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#1a6b3a;pointer-events:none;"></i>
            <input type="password" class="form-control" name="confirm_password"
                   style="padding-right:38px;"
                   placeholder="أعد كتابة كلمة المرور الجديدة"
                   id="confirm_pass" required>
          </div>
          <div id="match-msg" style="font-size:.76rem;margin-top:4px;"></div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary flex-grow-1">
            <i class="fas fa-save me-2"></i>حفظ كلمة المرور
          </button>
          <a href="/dashboard" class="btn btn-secondary">إلغاء</a>
        </div>

      </form>
    </div>
  </div>
</div>

<script>
const newPass     = document.getElementById('new_pass');
const confirmPass = document.getElementById('confirm_pass');
const matchMsg    = document.getElementById('match-msg');
const strengthWrap= document.getElementById('strength-wrap');
const fill        = document.getElementById('strength-fill');
const txt         = document.getElementById('strength-text');

newPass.addEventListener('input', function() {
  const v = this.value;
  strengthWrap.style.display = v ? 'block' : 'none';
  let score = 0;
  if (v.length >= 8)  score++;
  if (v.length >= 12) score++;
  if (/[A-Z]/.test(v) || /[a-z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;

  const pct    = Math.min((score / 5) * 100, 100);
  const colors = ['#dc3545','#f0a500','#1a6b3a'];
  const labels = ['ضعيفة','متوسطة','قوية'];
  const idx    = score <= 1 ? 0 : score <= 3 ? 1 : 2;

  fill.style.width      = pct + '%';
  fill.style.background = colors[idx];
  txt.textContent       = 'القوة: ' + labels[idx];
  txt.style.color       = colors[idx];
  checkMatch();
});

confirmPass.addEventListener('input', checkMatch);

function checkMatch() {
  if (!confirmPass.value) { matchMsg.textContent = ''; return; }
  if (newPass.value === confirmPass.value) {
    matchMsg.innerHTML = '<i class="fas fa-check me-1" style="color:#1a6b3a;"></i><span style="color:#1a6b3a;">كلمتا المرور متطابقتان</span>';
  } else {
    matchMsg.innerHTML = '<i class="fas fa-times me-1" style="color:#dc3545;"></i><span style="color:#dc3545;">كلمتا المرور غير متطابقتين</span>';
  }
}
</script>

{% endblock %}

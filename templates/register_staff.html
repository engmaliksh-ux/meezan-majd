<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل موظف – ميزان مجد</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .reg-page {
      min-height: 100vh;
      background: linear-gradient(145deg, #0f2d1c 0%, #1a6b3a 50%, #0f2d1c 100%);
      display: flex; align-items: flex-start; justify-content: center;
      padding: 24px 16px;
    }
    .reg-wrapper { width: 100%; max-width: 620px; }
    .reg-header {
      background: linear-gradient(135deg, #1565c0, #1e88e5);
      border-radius: 16px 16px 0 0;
      padding: 22px 28px 18px;
      display: flex; align-items: center; gap: 14px; color: #fff;
    }
    .reg-logo {
      width: 46px; height: 46px; background: rgba(255,255,255,.2);
      border-radius: 12px; display: flex; align-items: center;
      justify-content: center; font-size: 20px; flex-shrink: 0;
    }
    .reg-header h3 { margin: 0; font-size: 1.15rem; font-weight: 900; }
    .reg-header p  { margin: 2px 0 0; opacity: .75; font-size: .82rem; }
    .reg-body {
      background: #fff; border-radius: 0 0 16px 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
      padding: 24px 28px;
    }
    .section-label {
      font-weight: 800; font-size: .78rem; color: #6c7a72;
      text-transform: uppercase; letter-spacing: .5px;
      margin: 18px 0 10px; padding-bottom: 6px;
      border-bottom: 1px solid #d8e8de;
    }
    .section-label:first-child { margin-top: 0; }
    .form-label { font-weight: 700; font-size: .86rem; margin-bottom: 4px; }
    .form-control, .form-select {
      border: 2px solid #d8e8de; border-radius: 8px;
      padding: 9px 12px; font-family: 'Cairo', sans-serif;
      font-size: .88rem; text-align: right; transition: border-color .2s;
    }
    .form-control:focus, .form-select:focus {
      border-color: #1565c0; box-shadow: 0 0 0 3px rgba(21,101,192,.12);
    }
    .input-icon-wrap { position: relative; }
    .input-icon-wrap .form-control { padding-right: 38px; }
    .field-icon {
      position: absolute; right: 11px; top: 50%;
      transform: translateY(-50%); color: #1565c0;
      font-size: .85rem; pointer-events: none;
    }
    .auth-error {
      background: #fff0f0; border: 1px solid #ffcdd2; color: #c62828;
      border-radius: 8px; padding: 9px 12px; margin-bottom: 14px;
      font-size: .85rem; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
    }
    /* Role picker */
    .role-picker { display: flex; gap: 10px; }
    .role-option {
      flex: 1; border: 2px solid #d8e8de; border-radius: 10px;
      padding: 12px; cursor: pointer; transition: all .2s; margin: 0;
      display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center;
    }
    .role-option:hover { border-color: #aac8b5; background: #f9fcfa; }
    .role-option.selected { border-color: #1565c0; background: #e3f2fd; }
    .role-option input[type=radio] { display: none; }
    .role-icon-big { font-size: 1.6rem; }
    .role-name { font-weight: 800; font-size: .88rem; color: #1e2d24; }
    .role-desc { font-size: .74rem; color: #6c7a72; }
    /* Photo upload */
    .photo-area {
      border: 2px dashed #d8e8de; border-radius: 10px;
      padding: 16px; text-align: center; cursor: pointer; transition: all .2s;
    }
    .photo-area:hover { border-color: #1565c0; background: #f0f7ff; }
    .reg-btn {
      width: 100%; padding: 11px; font-size: .95rem; border-radius: 8px;
      background: linear-gradient(135deg, #1565c0, #1e88e5);
      color: #fff; font-family: 'Cairo', sans-serif;
      font-weight: 700; border: none; cursor: pointer; transition: all .25s; margin-top: 4px;
    }
    .reg-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(21,101,192,.4); }
    .auth-switch { text-align: center; margin-top: 14px; font-size: .84rem; color: #6c7a72; }
    .auth-switch a { color: #1565c0; font-weight: 700; text-decoration: none; }
    @media (max-width: 576px) {
      .reg-page { padding: 0; }
      .reg-wrapper { max-width: 100%; }
      .reg-header { border-radius: 0; padding: 16px 18px; }
      .reg-body { border-radius: 0; padding: 18px 16px; box-shadow: none; }
      .role-picker { flex-direction: column; }
    }
  </style>
</head>
<body class="reg-page">
  <div class="reg-wrapper">

    <div class="reg-header">
      <div class="reg-logo"><i class="fas fa-user-tie"></i></div>
      <div>
        <h3>تسجيل موظف جديد</h3>
        <p>ستحتاج رمز المؤسسة من مديرك للمتابعة</p>
      </div>
    </div>

    <div class="reg-body">
      {% if error %}
      <div class="auth-error"><i class="fas fa-exclamation-circle"></i>{{ error }}</div>
      {% endif %}

      <form method="POST" enctype="multipart/form-data">
<input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

        <!-- نوع الحساب -->
        <div class="section-label"><i class="fas fa-user-cog me-2"></i>نوع الحساب</div>
        <div class="role-picker mb-3">
          <label class="role-option" id="lbl-accountant">
            <input type="radio" name="role" value="accountant" required>
            <i class="fas fa-file-invoice role-icon-big" style="color:#1565c0;"></i>
            <div class="role-name">محاسب</div>
            <div class="role-desc">فواتير الإدخال والصرف والأصناف</div>
          </label>
          <label class="role-option" id="lbl-data">
            <input type="radio" name="role" value="data_entry">
            <i class="fas fa-users role-icon-big" style="color:#6a1b9a;"></i>
            <div class="role-name">مدخل بيانات</div>
            <div class="role-desc">إدارة بيانات المستفيدين</div>
          </label>
          <label class="role-option" id="lbl-observer">
            <input type="radio" name="role" value="observer">
            <i class="fas fa-eye role-icon-big" style="color:#00838f;"></i>
            <div class="role-name">مراقب عام</div>
            <div class="role-desc">عرض المخزون والبرامج فقط</div>
          </label>
        </div>

        <!-- رمز المؤسسة -->
        <div class="section-label"><i class="fas fa-key me-2"></i>رمز المؤسسة</div>
        <div class="mb-3">
          <label class="form-label">رمز المؤسسة <span class="text-danger">*</span></label>
          <div class="input-icon-wrap">
            <i class="fas fa-key field-icon"></i>
            <input type="text" name="org_code" class="form-control"
                   placeholder="MK-XXXX" maxlength="7"
                   style="letter-spacing:2px;font-weight:800;text-transform:uppercase;" required>
          </div>
          <div style="font-size:.74rem;color:#6c7a72;margin-top:3px;">
            <i class="fas fa-info-circle me-1"></i>احصل على هذا الرمز من مدير مؤسستك
          </div>
        </div>

        <!-- البيانات الشخصية -->
        <div class="section-label"><i class="fas fa-id-card me-2"></i>البيانات الشخصية</div>
        <div class="row g-2">
          <div class="col-12">
            <label class="form-label">الاسم الرباعي <span class="text-danger">*</span></label>
            <div class="input-icon-wrap">
              <i class="fas fa-user field-icon"></i>
              <input type="text" name="full_name" class="form-control" placeholder="الاسم الكامل رباعياً" required>
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label">رقم الهوية <span class="text-danger">*</span></label>
            <div class="input-icon-wrap">
              <i class="fas fa-fingerprint field-icon"></i>
              <input type="text" name="id_number" class="form-control" placeholder="9 أرقام" maxlength="9" inputmode="numeric" required>
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label">اسم المستخدم <span class="text-danger">*</span></label>
            <div class="input-icon-wrap">
              <i class="fas fa-at field-icon"></i>
              <input type="text" name="username" class="form-control" placeholder="3 أحرف على الأقل" minlength="3" required>
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label">كلمة المرور <span class="text-danger">*</span></label>
            <div class="input-icon-wrap">
              <i class="fas fa-lock field-icon"></i>
              <input type="password" name="password" class="form-control" placeholder="4 أحرف على الأقل" minlength="4" required>
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label">تأكيد كلمة المرور <span class="text-danger">*</span></label>
            <div class="input-icon-wrap">
              <i class="fas fa-lock field-icon"></i>
              <input type="password" name="password2" class="form-control" placeholder="أعد كتابة كلمة المرور" required>
            </div>
          </div>
          <div class="col-12">
            <label class="form-label">
              الصورة الشخصية
              <span style="color:#aaa;font-size:.74rem;">(اختياري)</span>
            </label>
            <div class="photo-area" id="photo-area">
              <i class="fas fa-camera" style="font-size:1.6rem;color:#ccc;margin-bottom:5px;display:block;"></i>
              <div style="font-size:.82rem;color:#6c7a72;">انقر لاختيار صورة · PNG, JPG حتى 3MB</div>
              <input type="file" name="photo" id="photo-input" accept="image/*" style="display:none;">
              <img id="photo-preview" src="" style="display:none;width:64px;height:64px;border-radius:50%;object-fit:cover;margin-top:8px;border:2px solid #1565c0;">
            </div>
          </div>
        </div>

        <button type="submit" class="reg-btn mt-3">
          <i class="fas fa-paper-plane me-2"></i>إرسال طلب التسجيل
        </button>
      </form>

      <div class="auth-switch">
        <a href="/register"><i class="fas fa-arrow-right me-1"></i>رجوع</a>
        &nbsp;·&nbsp; لديك حساب؟ <a href="/login">تسجيل الدخول</a>
      </div>
    </div>
  </div>

<script>
// Role selection highlight
document.querySelectorAll('.role-option input').forEach(r => {
  r.addEventListener('change', () => {
    document.querySelectorAll('.role-option').forEach(l => l.classList.remove('selected'));
    r.closest('.role-option').classList.add('selected');
  });
});
// Photo preview
const area  = document.getElementById('photo-area');
const input = document.getElementById('photo-input');
const prev  = document.getElementById('photo-preview');
area.addEventListener('click', () => input.click());
input.addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = ev => { prev.src = ev.target.result; prev.style.display='block'; area.style.borderColor='#1565c0'; };
    reader.readAsDataURL(file);
  }
});
// Uppercase org code
document.querySelector('[name=org_code]').addEventListener('input', function(){ this.value = this.value.toUpperCase(); });
</script>
</body>
</html>

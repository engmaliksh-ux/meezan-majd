name: Auto Deploy to PythonAnywhere

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"ref":"main"}' \
            "https://malikmohs.pythonanywhere.com/deploy/webhook"

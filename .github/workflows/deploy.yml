name: Auto Deploy to PythonAnywhere

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PA_TOKEN: ${{ secrets.PA_API_TOKEN }}
    steps:
      - name: Deploy via PA API
        run: |
          python3 - << 'PYEOF'
          import urllib.request, urllib.parse, urllib.error, json, os, time, sys

          token = os.environ["PA_TOKEN"].strip()
          base  = "https://www.pythonanywhere.com/api/v0/user/MalikMohs"

          def req(method, path, data=None):
              url  = base + path
              body = urllib.parse.urlencode(data).encode() if data else None
              r    = urllib.request.Request(url, data=body, method=method,
                         headers={"Authorization": "Token " + token,
                                  "Content-Type": "application/x-www-form-urlencoded"})
              try:
                  with urllib.request.urlopen(r) as resp:
                      txt = resp.read().decode()
                      return json.loads(txt) if txt else {}, resp.status
              except urllib.error.HTTPError as e:
                  txt = e.read().decode()
                  print(f"HTTP {e.code}: {txt}")
                  return json.loads(txt) if txt else {}, e.code

          # حذف consoles القديمة
          consoles, _ = req("GET", "/consoles/")
          for c in (consoles if isinstance(consoles, list) else []):
              req("DELETE", f"/consoles/{c['id']}/")
              print(f"Deleted console {c['id']}")
          time.sleep(2)

          # إنشاء console جديد
          result, status = req("POST", "/consoles/", {"executable": "bash"})
          print(f"Console create: status={status} id={result.get('id','?')}")
          if "id" not in result:
              print("ERROR: Could not create console")
              sys.exit(1)

          cid = result["id"]
          time.sleep(4)

          # git pull
          req("POST", f"/consoles/{cid}/send_input/",
              {"input": "cd ~/meezan-majd && git pull && echo '=DONE='\n"})
          time.sleep(28)

          # حذف console
          req("DELETE", f"/consoles/{cid}/")
          print("Done.")
          PYEOF

      - name: Reload web app
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Token $PA_TOKEN" \
            "https://www.pythonanywhere.com/api/v0/user/MalikMohs/webapps/malikmohs.pythonanywhere.com/reload/")
          echo "Reload HTTP status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Deployed!" || { echo "❌ Failed: $STATUS"; exit 1; }

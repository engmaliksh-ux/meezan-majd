name: Auto Deploy to PythonAnywhere

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Run git pull via PA Console
        run: |
          AUTH="Authorization: Token ${{ secrets.PA_API_TOKEN }}"
          BASE="https://www.pythonanywhere.com/api/v0/user/MalikMohs"

          # احذف جميع الـ consoles القديمة
          OLD=$(curl -s -H "$AUTH" "$BASE/consoles/")
          echo "$OLD" | python3 -c "
          import sys,json,urllib.request,urllib.error
          consoles=json.load(sys.stdin)
          for c in consoles:
              req=urllib.request.Request(
                  'https://www.pythonanywhere.com/api/v0/user/MalikMohs/consoles/'+str(c['id'])+'/',
                  method='DELETE',
                  headers={'Authorization':'Token ${{ secrets.PA_API_TOKEN }}'}
              )
              try: urllib.request.urlopen(req)
              except: pass
              print('Deleted console',c['id'])
          " || true
          sleep 2

          # أنشئ console جديد
          CONSOLE=$(curl -s -X POST -H "$AUTH" "$BASE/consoles/" -d "executable=bash")
          echo "Console response: $CONSOLE"
          CONSOLE_ID=$(echo $CONSOLE | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Console ID: $CONSOLE_ID"
          sleep 3

          # شغّل git pull
          curl -s -X POST -H "$AUTH" \
            "$BASE/consoles/$CONSOLE_ID/send_input/" \
            --data-urlencode "input=cd ~/meezan-majd && git pull && echo DONE\n"
          sleep 25

          # احذف الـ console بعد الانتهاء
          curl -s -X DELETE -H "$AUTH" "$BASE/consoles/$CONSOLE_ID/" || true

      - name: Reload web app
        run: |
          RESULT=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            "https://www.pythonanywhere.com/api/v0/user/MalikMohs/webapps/malikmohs.pythonanywhere.com/reload/")
          echo "Reload status: $RESULT"
          if [ "$RESULT" = "200" ]; then
            echo "✅ Deployed successfully!"
          else
            echo "❌ Reload failed with status $RESULT"
            exit 1
          fi
